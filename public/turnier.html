<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WM 2026 Turnierbaum</title>
<style>
:root{
  --bg:#050018;
  --blue:#173aaf;
  --cyan:#74d7ff;
  --lime:#caff59;
  --text:#ffffff;
  --muted:#d8dcff;
  --line:rgba(255,255,255,.72);
  --box:#73777f;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:#050018;color:var(--text);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;overflow:auto}
body{
  background:
    radial-gradient(circle at 50% 46%,rgba(42,101,255,.72),rgba(17,36,116,.55) 24%,rgba(15,7,46,.92) 55%,rgba(7,0,18,.98) 100%),
    linear-gradient(90deg,rgba(11,0,23,.96),rgba(24,54,166,.48),rgba(11,0,23,.96));
}
body:before{
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.16;
  background:
    radial-gradient(circle at 50% 50%,transparent 0 16%,rgba(255,255,255,.09) 17% 18%,transparent 19% 100%),
    linear-gradient(115deg,transparent 0 43%,rgba(255,255,255,.10) 44% 46%,transparent 47% 100%),
    linear-gradient(65deg,transparent 0 42%,rgba(255,255,255,.07) 43% 45%,transparent 46% 100%);
  mix-blend-mode:screen;
}
.page{width:1600px;max-width:100%;min-height:900px;margin:0 auto;padding:28px 36px 28px;position:relative}
.header{position:relative;text-align:center;height:145px}
h1{margin:20px 0 0;font-size:56px;line-height:1.05;letter-spacing:5px;text-transform:uppercase;font-weight:900;text-shadow:0 0 22px rgba(126,178,255,.55)}
.topnav{position:absolute;right:0;top:0;display:flex;gap:10px}
.topnav a,.topnav button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);color:white;border-radius:999px;padding:9px 13px;font-weight:900;text-decoration:none;cursor:pointer}
.topnav a.active{background:rgba(202,255,89,.2);color:var(--lime)}
.bracket{position:relative;display:grid;grid-template-columns:270px 210px 190px 1fr 190px 210px 270px;gap:20px;align-items:start;min-height:680px}
.colTitle{height:38px;color:var(--lime);font-weight:900;text-transform:uppercase;font-size:19px;line-height:1.05;letter-spacing:.3px;text-shadow:0 0 12px rgba(202,255,89,.25)}
.round{position:relative}
.left32 .slot,.right32 .slot{margin-bottom:16px}
.left16 .slot,.right16 .slot{margin-bottom:70px}
.leftQ .slot,.rightQ .slot{margin-bottom:154px}
.leftSemi,.rightSemi{padding-top:355px}
.slot{
  min-height:76px;position:relative;display:flex;flex-direction:column;justify-content:center;
}
.team{
  display:grid;grid-template-columns:46px 1fr;gap:9px;align-items:center;min-height:32px;margin:3px 0;font-weight:900;font-size:18px;text-shadow:0 2px 6px rgba(0,0,0,.5)
}
.right32 .team,.right16 .team,.rightQ .team,.rightSemi .team{grid-template-columns:1fr 46px;text-align:right}
.flag,.qmark{
  width:46px;height:30px;border-radius:4px;border:2px solid rgba(255,255,255,.75);object-fit:cover;background:#777;display:flex;align-items:center;justify-content:center;color:white;font-size:24px;font-weight:1000;box-shadow:0 0 0 1px rgba(0,0,0,.6) inset
}
.qmark{background:linear-gradient(#8c8f95,#5f6268)}
.seed{font-size:16px;color:#fff;font-weight:900}
.seed b{color:var(--lime)}
.vline,.hline{position:absolute;background:var(--line);opacity:.95}
.left32 .slot:after,.left16 .slot:after,.leftQ .slot:after{content:"";position:absolute;right:-12px;top:20px;width:2px;height:56px;background:var(--line)}
.left32 .slot:before,.left16 .slot:before,.leftQ .slot:before{content:"";position:absolute;right:-12px;top:47px;width:12px;height:2px;background:var(--line)}
.right32 .slot:after,.right16 .slot:after,.rightQ .slot:after{content:"";position:absolute;left:-12px;top:20px;width:2px;height:56px;background:var(--line)}
.right32 .slot:before,.right16 .slot:before,.rightQ .slot:before{content:"";position:absolute;left:-12px;top:47px;width:12px;height:2px;background:var(--line)}
.leftSemi .slot:after{content:"HALBFINALE";position:absolute;left:-54px;top:-84px;writing-mode:vertical-rl;transform:rotate(180deg);color:var(--lime);font-weight:900;font-size:19px;letter-spacing:1px}
.rightSemi .slot:after{content:"HALBFINALE";position:absolute;right:-54px;top:-84px;writing-mode:vertical-rl;color:var(--lime);font-weight:900;font-size:19px;letter-spacing:1px}
.center{padding-top:122px;text-align:center;position:relative}
.center h2{color:var(--lime);font-size:30px;margin:0 0 12px;text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 12px rgba(202,255,89,.25)}
.finalTeams{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.center .smallTeam{display:flex;align-items:center;gap:7px;font-size:16px;font-weight:900}
.trophy{margin:48px auto 30px;width:78px;height:104px;border-radius:40px;background:linear-gradient(135deg,#fff6bd,#bc8624 48%,#fff3a0);box-shadow:0 0 30px rgba(255,210,68,.45);display:flex;align-items:end;justify-content:center;color:#111;font-weight:1000;padding-bottom:12px}
.centerLine{height:2px;background:var(--line);width:190px;margin:22px auto;position:relative}
.centerLine:before,.centerLine:after{content:"";position:absolute;top:0;width:2px;height:34px;background:var(--line)}
.centerLine:before{left:0}.centerLine:after{right:0}
.third{margin-top:6px}
.miniMeta{font-size:13px;color:var(--muted);font-weight:800;margin:3px 0 7px}
.score{display:inline-block;min-width:38px;color:var(--lime);font-weight:1000}
.status{font-size:12px;color:var(--muted);font-weight:800}
.footer{display:flex;justify-content:space-between;color:var(--muted);font-weight:800;font-size:13px;margin-top:18px}
@media(max-width:1200px){
  html,body{overflow:auto}
  .page{width:100%;min-height:auto}
  .header{height:auto;padding-bottom:20px}
  h1{font-size:36px}
  .topnav{position:static;justify-content:center;margin-top:16px;flex-wrap:wrap}
  .bracket{display:block}
  .round{margin-bottom:18px;background:rgba(0,0,0,.20);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px}
  .left16,.right16,.leftQ,.rightQ,.leftSemi,.rightSemi,.center{padding-top:0}
  .slot{min-height:auto;margin-bottom:10px!important}
  .slot:before,.slot:after{display:none!important}
  .right32 .team,.right16 .team,.rightQ .team,.rightSemi .team{grid-template-columns:46px 1fr;text-align:left}
  .right32 .team .flag,.right32 .team .qmark,.right16 .team .flag,.right16 .team .qmark,.rightQ .team .flag,.rightQ .team .qmark,.rightSemi .team .flag,.rightSemi .team .qmark{order:-1}
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="topnav">
      <a href="/">TV-Seite</a>
      <a href="/admin.html">Ergebnisse</a>
      <a class="active" href="/turnier.html">Turnierbaum</a>
      <button id="refreshBtn">Aktualisieren</button>
    </div>
    <h1>Die K.O.-Runde der<br>WM 2026</h1>
  </div>

  <div class="bracket">
    <div class="round left32"><div class="colTitle">Runde der<br>letzten 32</div><div id="left32"></div></div>
    <div class="round left16"><div class="colTitle">Achtelfinale</div><div id="left16"></div></div>
    <div class="round leftQ"><div class="colTitle">Viertelfinale</div><div id="leftQ"></div></div>

    <div class="center">
      <h2>Finale</h2>
      <div id="finalBox"></div>
      <div class="centerLine"></div>
      <div class="trophy">FIFA</div>
      <div class="centerLine"></div>
      <div class="third">
        <h2 style="font-size:20px;margin-top:0">Spiel um Platz 3</h2>
        <div id="thirdBox"></div>
      </div>
    </div>

    <div class="round rightQ"><div class="colTitle">Viertelfinale</div><div id="rightQ"></div></div>
    <div class="round right16"><div class="colTitle">Achtelfinale</div><div id="right16"></div></div>
    <div class="round right32"><div class="colTitle">Runde der<br>letzten 32</div><div id="right32"></div></div>
  </div>

  <div class="footer">
    <div id="status">Lade Daten…</div>
    <div>Alle Zeiten Deutschland / Europe-Berlin</div>
  </div>
</div>

<script>
let serverTimeOffsetMs=0;
function getSyncedNow(){return new Date(Date.now()+serverTimeOffsetMs)}
function matchDate(m){if(m.timestamp&&Number(m.timestamp)>0)return new Date(Number(m.timestamp)*1000);return new Date(m.date)}
function fmtDate(m){return new Intl.DateTimeFormat("de-DE",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",timeZone:"Europe/Berlin"}).format(matchDate(m))}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
function flag(url,name){return url?`<img class="flag" src="${esc(url)}" alt="${esc(name)}" onerror="this.outerHTML='<span class=&quot;qmark&quot;>?</span>'">`:`<span class="qmark">?</span>`}
function roundName(raw){const r=String(raw||"");if(/Round of 32/i.test(r))return"R32";if(/Round of 16/i.test(r))return"R16";if(/Quarter/i.test(r))return"QF";if(/Semi/i.test(r))return"SF";if(/Third/i.test(r))return"THIRD";if(/Final/i.test(r))return"FINAL";return""}
function isPlaceholder(t){return /^(Sieger|Verlierer|Zweiter|Dritter|1\.|2\.|3\.)/i.test(String(t||""))}
function teamLine(name,url,right=false){
  const n=esc(name||"noch offen");
  const icon=isPlaceholder(name)?'<span class="qmark">?</span>':flag(url,name);
  return right?`<div class="team"><span>${n}</span>${icon}</div>`:`<div class="team">${icon}<span>${n}</span></div>`;
}
function scoreText(m){
  const has=m.homeScore!==null&&m.homeScore!==undefined&&m.awayScore!==null&&m.awayScore!==undefined;
  return has?`<span class="score">${m.homeScore}:${m.awayScore}</span>`:`<span class="status">noch offen</span>`;
}
function slot(m,right=false){
  if(!m)return `<div class="slot">${teamLine("noch offen","",right)}${teamLine("noch offen","",right)}</div>`;
  return `<div class="slot">
    <div class="miniMeta">#${m.matchNo||m.fixtureId} · ${fmtDate(m)}</div>
    ${teamLine(m.home,m.homeFlagUrl,right)}
    ${teamLine(m.away,m.awayFlagUrl,right)}
    <div class="status">${scoreText(m)} · ${esc(m.statusText||"Geplant")}</div>
  </div>`;
}
function centerSlot(m){
  if(!m)return `<div class="finalTeams"><span class="qmark">?</span><span class="qmark">?</span></div><div class="status">noch offen<br>noch offen</div>`;
  return `<div class="miniMeta">${fmtDate(m)} · ${esc(m.stadium||"")}</div>
  <div class="finalTeams">
    ${isPlaceholder(m.home)?'<span class="qmark">?</span>':flag(m.homeFlagUrl,m.home)}
    ${isPlaceholder(m.away)?'<span class="qmark">?</span>':flag(m.awayFlagUrl,m.away)}
  </div>
  <div class="status">${esc(m.home)}<br>${esc(m.away)}<br>${scoreText(m)}</div>`;
}
function render(matches){
  const r32=matches.filter(m=>roundName(m.group)==="R32").sort((a,b)=>matchDate(a)-matchDate(b));
  const r16=matches.filter(m=>roundName(m.group)==="R16").sort((a,b)=>matchDate(a)-matchDate(b));
  const qf=matches.filter(m=>roundName(m.group)==="QF").sort((a,b)=>matchDate(a)-matchDate(b));
  const sf=matches.filter(m=>roundName(m.group)==="SF").sort((a,b)=>matchDate(a)-matchDate(b));
  const third=matches.find(m=>roundName(m.group)==="THIRD");
  const final=matches.find(m=>roundName(m.group)==="FINAL");

  document.getElementById("left32").innerHTML=r32.slice(0,8).map(m=>slot(m,false)).join("");
  document.getElementById("right32").innerHTML=r32.slice(8,16).map(m=>slot(m,true)).join("");
  document.getElementById("left16").innerHTML=r16.slice(0,4).map(m=>slot(m,false)).join("");
  document.getElementById("right16").innerHTML=r16.slice(4,8).map(m=>slot(m,true)).join("");
  document.getElementById("leftQ").innerHTML=qf.slice(0,2).map(m=>slot(m,false)).join("");
  document.getElementById("rightQ").innerHTML=qf.slice(2,4).map(m=>slot(m,true)).join("");
  document.getElementById("finalBox").innerHTML=centerSlot(final);
  document.getElementById("thirdBox").innerHTML=centerSlot(third);
}
async function load(){
  const status=document.getElementById("status");
  status.textContent="Lade Daten…";
  try{
    const res=await fetch("/api/wm2026",{cache:"no-store"});
    const data=await res.json();
    if(data.serverNow)serverTimeOffsetMs=new Date(data.serverNow).getTime()-Date.now();
    render((data.matches||[]).sort((a,b)=>matchDate(a)-matchDate(b)));
    const warn=data.warning?` · Hinweis: ${data.warning}`:"";
    status.textContent=`Stand: ${new Intl.DateTimeFormat("de-DE",{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZone:"Europe/Berlin"}).format(getSyncedNow())} · Quelle: ${data.source||"Spielplan"}${warn}`;
  }catch(err){status.textContent="Fehler beim Laden: "+(err.message||err)}
}
document.getElementById("refreshBtn").onclick=load;
load();
setInterval(load,60000);
</script>
</body>
</html>
